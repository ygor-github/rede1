services:
  web:
    build: .
    container_name: redeon-landing
    restart: unless-stopped
    networks:
      - proxy_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redeon-landing.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.redeon-landing.tls=true"
      - "traefik.http.routers.redeon-landing.entrypoints=web,websecure"
      - "traefik.http.routers.redeon-landing.tls.certresolver=mytlschallenge"
      - "traefik.http.middlewares.redeon-landing.headers.SSLRedirect=true"
      - "traefik.http.middlewares.redeon-landing.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.redeon-landing.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.redeon-landing.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.redeon-landing.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.redeon-landing.headers.SSLHost=${DOMAIN_NAME}"
      - "traefik.http.middlewares.redeon-landing.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.redeon-landing.headers.STSPreload=true"
      - "traefik.http.routers.redeon-landing.middlewares=redeon-landing@docker"
      # --- Redirección: redeon.cloud → www.redeon.cloud ---
      - "traefik.http.routers.redeon-root.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.redeon-root.entrypoints=web,websecure"
      - "traefik.http.routers.redeon-root.tls=true"
      - "traefik.http.routers.redeon-root.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.redeon-root.middlewares=redirect-to-www@docker"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.regex=^https?://${DOMAIN_NAME}(.*)"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.replacement=https://${SUBDOMAIN}.${DOMAIN_NAME}$${1}"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.permanent=true"

networks:
  proxy_net:
    external: true
