<!DOCTYPE html>

  <title>Redeon | Agência de Automação B2B & Infraestrutura Cloud</title>

  <!-- JSON-LD Structured Data: Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Redeon",
      "url": "https://www.redeon.cloud",
      "description": "Agência de Automação B2B especializada em otimização de processos e integração de sistemas.",

        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": ["Portuguese", "English", "Spanish"]
      },
      "sameAs": []
    }

  <!-- Preload Critical Fonts -->
